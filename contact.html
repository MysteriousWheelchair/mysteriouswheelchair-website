<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact the Author</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 700px; margin: auto; padding: 20px; }
    h1 { text-align: center; }
    form { margin-top: 20px; }
    label { display: block; margin-top: 15px; font-weight: bold; }
    input, textarea { width: 100%; padding: 10px; margin-top: 5px; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 1em; }
    footer { text-align: center; margin-top: 40px; font-size: 0.9em; }
  </style>
</head>

<body>

<h1>Contact the Author</h1>

<p>If you’d like to send feedback or ask a question, use the form below.</p>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
  <label>Your Name</label>
  <input type="text" name="name" required>

  <label>Your Email</label>
  <input type="email" name="email" required>

  <label>Your Message</label>
  <textarea name="message" rows="6" required></textarea>

  <button type="submit">Send Message</button>
</form>

<footer>

</footer>

</body>
</html>
